<div class="grid-composer">
    <div>
        <label for="title">Title</label>
        <input type="text" name="title" id="title" value="{{.Title}}">
    </div>
    <div>
        <label for="system">System</label>
        <input type="text" name="system" id="system" value="{{.System}}">
    </div>
</div>
<div>
    <label for="message">Message</label>
    <textarea name="message" id="message" rows="3">{{.Message}}</textarea>
</div>
<div class="grid-composer">
    <div>
        <label for="author">Author</label>
        <input type="text" name="author" id="author" value="{{.Author}}">
    </div>
    <div>
        <label for="tags">Tags</label>
        <input type="text" name="tags" id="tags" value="{{.Tags}}">
    </div>
</div>
<div class="grid-composer">
    <div>
        <label for="assignee_name">Assignee Name</label>
        <input type="text" name="assignee_name" id="assignee_name" value="{{.AssigneeName}}">
    </div>
    <div>
        <label for="assignee_address">Assignee Address</label>
        <input type="text" name="assignee_address" id="assignee_address" value="{{.AssigneeAddress}}">
    </div>
</div>
<div class="grid-composer">
    <div>
        <label for="artifacts">Artifacts</label>
        <input type="text" name="artifacts" id="artifacts" value="{{.Artifacts}}">
    </div>
    <div>
        <label for="url">URL</label>
        <input type="text" name="url" id="url" value="{{.Url}}">
    </div>
</div>
